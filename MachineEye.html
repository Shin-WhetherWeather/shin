<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Update</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0e0e10;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 640px;
            width: 100%;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 500;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1.5rem;
        }

        /* ── Message card ─────────────────────────────────────── */
        .card {
            background: #1a1a1f;
            border: 1px solid #2a2a30;
            border-radius: 12px;
            overflow: hidden;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #2a2a30;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #333;
            flex-shrink: 0;
        }

        .author-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #f0f0f0;
        }

        .timestamp {
            font-size: 0.8rem;
            color: #666;
            margin-left: auto;
        }

        /* ── Text content ─────────────────────────────────────── */
        .card-text {
            padding: 1.25rem;
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .card-text:empty { display: none; }

        /* ── Images ───────────────────────────────────────────── */
        .card-images {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .card-images img {
            width: 100%;
            display: block;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .card-images img:hover { opacity: 0.85; }

        /* ── States ───────────────────────────────────────────── */
        .loading, .error {
            text-align: center;
            padding: 3rem 1rem;
            color: #666;
            font-size: 0.95rem;
        }

        .error { color: #c44; }

        .meta {
            text-align: center;
            padding: 1rem;
            font-size: 0.75rem;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Latest Update</h1>
        <div id="content">
            <div class="loading">Loading…</div>
        </div>
        <div id="meta" class="meta"></div>
    </div>

    <script>
        // ── Config ──────────────────────────────────────────────
        // Path to the JSON file pushed by the Python script.
        // Adjust if your repo structure differs.
        const DATA_URL = "data/latest.json";
        // ────────────────────────────────────────────────────────

        const POLL_INTERVAL = 8;  // seconds between checks

        const $content = document.getElementById("content");
        const $meta    = document.getElementById("meta");
        let currentMessageId = null;

        async function load() {
            try {
                // Cache-bust so the browser revalidates with the CDN
                const resp = await fetch(`${DATA_URL}?t=${Date.now()}`, { cache: "no-cache" });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();

                // Only re-render if the message actually changed
                if (data.message_id !== currentMessageId) {
                    currentMessageId = data.message_id;
                    render(data);
                }

                updateStatus();
            } catch (err) {
                $content.innerHTML = `<div class="error">Couldn't load data.<br>${err.message}</div>`;
            }
        }

        function render(data) {
            const date = data.timestamp ? new Date(data.timestamp) : null;
            const timeStr = date
                ? date.toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" })
                  + " · "
                  + date.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" })
                : "";

            const avatarHTML = data.author?.avatar_url
                ? `<img class="avatar" src="${esc(data.author.avatar_url)}" alt="">`
                : `<div class="avatar"></div>`;

            const imagesHTML = (data.images || [])
                .map(img => `<a href="${esc(img.url)}" target="_blank" rel="noopener">
                    <img src="${esc(img.proxy_url || img.url)}" alt="" loading="lazy">
                </a>`)
                .join("");

            $content.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        ${avatarHTML}
                        <span class="author-name">${esc(data.author?.name || "Unknown")}</span>
                        <span class="timestamp">${timeStr}</span>
                    </div>
                    ${data.text ? `<div class="card-text">${esc(data.text)}</div>` : ""}
                    ${imagesHTML ? `<div class="card-images">${imagesHTML}</div>` : ""}
                </div>
            `;

            if (data.fetched_at) {
                const fetched = new Date(data.fetched_at);
                $meta.dataset.synced = `Last synced: ${fetched.toLocaleString()} · `;
            }
        }

        function esc(str) {
            const el = document.createElement("span");
            el.textContent = str || "";
            return el.innerHTML;
        }

        // ── Auto-polling ────────────────────────────────────────
        let secondsUntilNext = POLL_INTERVAL;

        function updateStatus() {
            secondsUntilNext = POLL_INTERVAL;
        }

        function tick() {
            secondsUntilNext--;
            if (secondsUntilNext <= 0) {
                load();
            }
            $meta.textContent = `${$meta.dataset.synced || ""}Next check in ${secondsUntilNext}s`;
        }

        load();
        setInterval(tick, 1000);
    </script>
</body>
</html>
